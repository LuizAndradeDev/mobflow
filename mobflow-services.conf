upstream auth_service {
    server auth-service:8080;
}

upstream user_service {
    server user-service:8081;
}

upstream workspace_service {
    server workspace-service:8082;
}

upstream task_service {
    server task-service:8083;
}

upstream notification_service {
    server notification-service:8084;
}

upstream social_service {
    server social-service:8085;
}

upstream chat_service {
    server chat-service:8086;
}

upstream api_gateway {
    server api-gateway:8080;
}

server {
    listen 80;
    server_name _;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://api_gateway:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
    }

    location /health {
        access_log off;
        return 200 "OK";
    }
}