spring.application.name=workspace-service
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${WORKSPACE_DB}?TimeZone=America/Sao_Paulo
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=America/Sao_Paulo

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

security.jwt.secret-key=${JWT_SECRET}
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}

user.service.url=${USER_SERVICE_URL}
internal.secret=${INTERNAL_SECRET}
app.kafka.topics.workspace=${WORKSPACE_EVENTS_TOPIC:workspace-events}

server.port=8082
