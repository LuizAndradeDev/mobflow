
<div *ngIf="alert"
     [ngClass]="getStyles()"
     class="flex items-start sm:items-center p-4 mb-4 text-sm rounded-base border fixed top-4 right-4 z-50 shadow-lg animate-fade-in"
     role="alert">


  <svg class="w-4 h-4 me-2 shrink-0 mt-0.5 sm:mt-0" aria-hidden="true" xmlns="http://www.w3.org" width="24" height="24" fill="none" viewBox="0 0 24 24">
    <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 11h2v5m-2 0h4m-2.592-8.5h.01M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/>
  </svg>

  <p>

    <span class="font-medium me-1">{{ alert.title }}</span>
    {{ alert.message }}
  </p>


  <button (click)="close()" class="ms-auto font-bold px-2 hover:opacity-70 transition-opacity" aria-label="Close">
    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
  </button>
</div>
