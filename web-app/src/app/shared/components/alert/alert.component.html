<div class="alert-container">
  @for (alert of alertService.alerts(); track alert.id) {
    <div
      class="alert-card"
      [class.alert-enter]="!alert.leaving"
      [class.alert-leave]="alert.leaving"
      role="alert"
    >
      <div class="alert-bar" [ngClass]="barClass(alert)"></div>
      <div class="alert-content">
        <p class="alert-title">{{ alert.title }}</p>
        <p class="alert-message">{{ alert.message }}</p>
      </div>
      <button
        type="button"
        (click)="alertService.dismiss(alert.id)"
        class="alert-close"
        aria-label="Close alert"
      >
        <svg class="alert-close-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>
  }
</div>
