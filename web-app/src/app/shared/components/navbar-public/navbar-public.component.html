<div class="pointer-events-none fixed left-3 right-3 top-3 z-50 flex justify-center sm:left-4 sm:right-4 sm:top-4">
  <nav class="pointer-events-auto flex w-full max-w-5xl items-center justify-between rounded-2xl border border-gray-200 bg-white/90 px-4 py-3 shadow-xl backdrop-blur-md dark:border-gray-700 dark:bg-gray-900/90 sm:px-6">
    <a routerLink="/" class="flex items-center gap-2">
      <div class="flex h-7 w-7 items-center justify-center rounded-lg bg-blue-600">
        <span class="text-sm font-bold text-white">M</span>
      </div>
      <span class="text-lg font-bold text-blue-600">Mobflow</span>
    </a>

    <div class="flex items-center gap-2 sm:gap-3">
      <button
        type="button"
        (click)="toggleTheme()"
        class="flex h-10 w-10 items-center justify-center rounded-xl border border-gray-200 bg-white text-gray-600 transition hover:bg-gray-50 dark:border-gray-700 dark:bg-gray-800 dark:text-gray-200 dark:hover:bg-gray-700"
        [attr.aria-label]="themeService.isDark() ? 'Switch to light mode' : 'Switch to dark mode'"
      >
        @if (themeService.isDark()) {
          <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 3v2.25m0 13.5V21m8.485-8.485h-2.25m-11.97 0h-2.25m12.954 6.364-1.591-1.591M8.106 8.106 6.515 6.515m10.954 0-1.591 1.591M8.106 15.894l-1.591 1.591M15 12a3 3 0 11-6 0 3 3 0 016 0z"
            />
          </svg>
        } @else {
          <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M21 12.79A9 9 0 1111.21 3c-.09.58-.14 1.17-.14 1.79A9 9 0 0021 12.79z"
            />
          </svg>
        }
      </button>

      <a
        [routerLink]="ctaLink"
        class="flex items-center gap-2 rounded-xl px-3 py-2 text-sm font-semibold text-gray-700 transition hover:text-blue-600 dark:text-gray-200 dark:hover:text-blue-400 sm:px-4"
      >
        <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9"
          />
        </svg>
        <span class="hidden sm:inline">{{ ctaLabel }}</span>
        <span class="sm:hidden">{{ router.url === '/login' ? 'Sign up' : 'Login' }}</span>
      </a>
    </div>
  </nav>
</div>
