<header class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between">
  <a routerLink="/" class="text-xl font-bold text-blue-600 tracking-tight">Mobflow</a>

  @if (userState.isLoggedIn()) {
    <div class="flex items-center gap-4">
      @if (userState.user(); as user) {
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-sm font-bold text-blue-600 select-none">
            {{ user.username[0].toUpperCase() }}
          </div>
          <span class="text-sm font-medium text-gray-700">{{ user.username }}</span>
        </div>
      }
      <button
        (click)="logout()"
        class="text-sm text-gray-500 hover:text-red-500 transition font-medium">
        Sign out
      </button>
    </div>
  } @else {
    <a routerLink="/login"
       class="text-sm font-medium text-blue-600 hover:text-blue-700 transition">
      Sign in
    </a>
  }
</header>
