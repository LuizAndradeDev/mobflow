<app-navbar-public></app-navbar-public>

<div class="min-h-screen bg-gray-50 px-4 pb-8 pt-28 dark:bg-gray-950 sm:pt-32">
  <div class="mx-auto flex min-h-[calc(100dvh-8rem)] w-full max-w-md items-center">
    <div class="w-full rounded-2xl border border-gray-100 bg-white p-6 text-center shadow-sm dark:border-gray-800 dark:bg-gray-900 sm:p-8">
      <div
        class="mx-auto flex h-14 w-14 items-center justify-center rounded-2xl"
        [class.bg-blue-100]="state === 'loading'"
        [class.dark:bg-blue-900/30]="state === 'loading'"
        [class.bg-emerald-100]="state === 'success'"
        [class.dark:bg-emerald-900/30]="state === 'success'"
        [class.bg-red-100]="state === 'error'"
        [class.dark:bg-red-900/30]="state === 'error'"
      >
        @if (state === 'loading') {
          <svg class="h-6 w-6 animate-spin text-blue-600 dark:text-blue-300" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-20" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-90" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
          </svg>
        } @else if (state === 'success') {
          <svg class="h-6 w-6 text-emerald-600 dark:text-emerald-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2" d="M5 13l4 4L19 7" />
          </svg>
        } @else {
          <svg class="h-6 w-6 text-red-600 dark:text-red-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        }
      </div>

      <h1 class="mt-6 text-xl font-bold text-gray-900 dark:text-gray-100 sm:text-2xl">{{ title }}</h1>
      <p class="mt-2 text-sm leading-6 text-gray-500 dark:text-gray-400">{{ message }}</p>

      <div class="mt-6 flex flex-col gap-3 sm:flex-row">
        <a
          routerLink="/login"
          class="flex-1 rounded-xl bg-blue-600 px-4 py-3 text-sm font-semibold text-white transition hover:bg-blue-700"
        >
          Go to login
        </a>
        <a
          routerLink="/signup"
          class="flex-1 rounded-xl border border-gray-200 px-4 py-3 text-sm font-semibold text-gray-700 transition hover:bg-gray-50 dark:border-gray-700 dark:text-gray-200 dark:hover:bg-gray-800"
        >
          Create another account
        </a>
      </div>
    </div>
  </div>
</div>
