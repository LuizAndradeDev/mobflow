<main class="flex flex-1 items-center justify-center px-4 mt-16">
  <div class="text-center max-w-md w-full">

    @if (userProfileState.profile(); as profile) {

      <!-- Avatar -->
      <div class="mx-auto mb-6 w-20 h-20 rounded-full overflow-hidden bg-blue-100 flex items-center justify-center">
        @if (profile.avatarUrl) {
          <img [src]="profile.avatarUrl" [alt]="profile.displayName" class="w-full h-full object-cover" />
        } @else {
          <span class="text-3xl font-bold text-blue-600 select-none">
            {{ profile.displayName[0].toUpperCase() }}
          </span>
        }
      </div>

      <!-- Greeting -->
      <p class="text-sm font-medium text-blue-500 uppercase tracking-widest mb-1">
        {{ greeting }},
      </p>
      <h1 class="text-4xl font-bold text-gray-800 mb-2">
        {{ profile.displayName }}
      </h1>

      @if (profile.bio) {
        <p class="text-gray-500 text-sm mb-2 max-w-xs mx-auto">{{ profile.bio }}</p>
      }

      <!-- Clock -->
      <div class="inline-block bg-white border border-gray-200 rounded-2xl px-6 py-3 shadow-sm mt-6 mb-8">
        <span class="text-2xl font-mono text-gray-700 tracking-widest">
          {{ currentTime | date: 'HH:mm:ss' }}
        </span>
      </div>

      <!-- Actions -->
      <div class="flex items-center justify-center gap-4">
        <div class="flex items-center gap-2">
          <span class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span>
          <span class="text-sm text-gray-400">You're logged in</span>
        </div>
        <span class="text-gray-200">|</span>
        <a
          routerLink="/profile/edit"
          class="text-sm text-blue-500 hover:text-blue-700 transition font-medium"
        >
          Edit profile
        </a>
      </div>

    } @else {

      <!-- Loading state -->
      <div class="mx-auto mb-6 w-20 h-20 rounded-full bg-gray-100 animate-pulse"></div>
      <div class="h-6 w-40 bg-gray-100 rounded animate-pulse mx-auto mb-2"></div>
      <div class="h-4 w-56 bg-gray-100 rounded animate-pulse mx-auto mb-8"></div>

    }

  </div>
</main>
