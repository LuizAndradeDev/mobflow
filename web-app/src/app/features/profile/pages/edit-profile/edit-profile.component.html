<div class="p-8 max-w-lg mx-auto">

  <div class="flex items-center gap-3 mb-8">
    <button
      (click)="goBack()"
      class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 transition"
    >
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
      </svg>
    </button>
    <div>
      <h2 class="text-xl font-bold text-gray-800 dark:text-gray-100">Edit profile</h2>
      <p class="text-sm text-gray-500 dark:text-gray-400">Update your personal information</p>
    </div>
  </div>

  <!-- Avatar -->
  <div class="flex flex-col items-center mb-8">
    <div class="relative">
      <div class="w-24 h-24 rounded-full overflow-hidden bg-blue-100 dark:bg-blue-900/40 flex items-center justify-center">
        @if (avatarPreview) {
          <img [src]="avatarPreview" alt="Avatar" class="w-full h-full object-cover"/>
        } @else {
          <span class="text-3xl font-bold text-blue-600 dark:text-blue-300 select-none">
            {{ profileForm.get('displayName')?.value?.[0]?.toUpperCase() || '?' }}
          </span>
        }
      </div>
      <label
        for="avatarInput"
        class="absolute bottom-0 right-0 w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center cursor-pointer hover:bg-blue-700 transition shadow"
        [class.opacity-50]="isUploadingAvatar"
      >
        @if (isUploadingAvatar) {
          <svg class="w-4 h-4 text-white animate-spin" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
          </svg>
        } @else {
          <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
        }
      </label>
      <input id="avatarInput" type="file" accept="image/jpeg,image/png,image/webp" class="hidden" [disabled]="isUploadingAvatar" (change)="onAvatarSelected($event)"/>
    </div>
    <p class="text-xs text-gray-400 dark:text-gray-500 mt-2">JPEG, PNG or WebP · Max 5MB</p>
  </div>

  <div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-100 dark:border-gray-800 p-6 shadow-sm">
    <form [formGroup]="profileForm" (ngSubmit)="onSubmit()" class="space-y-5">

      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">
          Display name <span class="text-red-500">*</span>
        </label>
        <input
          formControlName="displayName"
          type="text"
          class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 text-gray-800 dark:text-gray-100 bg-white dark:bg-gray-800 outline-none transition focus:ring-2 focus:ring-blue-500"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">Bio</label>
        <textarea
          formControlName="bio"
          rows="3"
          class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 text-gray-800 dark:text-gray-100 bg-white dark:bg-gray-800 outline-none transition focus:ring-2 focus:ring-blue-500 resize-none"
        ></textarea>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">Phone</label>
        <input
          formControlName="phone"
          type="tel"
          class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 text-gray-800 dark:text-gray-100 bg-white dark:bg-gray-800 outline-none transition focus:ring-2 focus:ring-blue-500"
        />
      </div>

      <div class="flex gap-3 pt-2">
        <button type="button" (click)="goBack()" class="flex-1 py-3 border border-gray-300 dark:border-gray-600 rounded-xl text-gray-700 dark:text-gray-300 font-semibold hover:bg-gray-50 dark:hover:bg-gray-800 transition">
          Cancel
        </button>
        <button type="submit" [disabled]="profileForm.invalid || isLoading" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-semibold hover:bg-blue-700 transition disabled:opacity-50">
          {{ isLoading ? 'Saving...' : 'Save changes' }}
        </button>
      </div>

    </form>
  </div>
</div>
