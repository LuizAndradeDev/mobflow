name: Backend CI

on:
  push:
    paths-ignore:
      - "web-app/**"
  pull_request:
    paths-ignore:
      - "web-app/**"

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-service:
    name: ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 25

    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - user-service
          - workspace-service
          - task-service
          - notification-service
          - social-service
          - chat-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: |
            auth-service/pom.xml
            user-service/pom.xml
            workspace-service/pom.xml
            task-service/pom.xml
            notification-service/pom.xml
            social-service/pom.xml
            chat-service/pom.xml

      - name: Verify Docker availability
        run: docker version

      - name: Build and test service
        working-directory: ${{ matrix.service }}
        run: ./mvnw --batch-mode --no-transfer-progress verify

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-surefire-reports
          path: ${{ matrix.service }}/target/surefire-reports/
          if-no-files-found: ignore
          retention-days: 7
