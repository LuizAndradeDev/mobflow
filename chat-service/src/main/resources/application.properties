spring.application.name=chat-service
spring.data.mongodb.auto-index-creation=true
spring.data.mongodb.uri=mongodb://${MONGO_USER}:${MONGO_PASSWORD}@${MONGO_HOST:mongodb}:${MONGO_PORT:27017}/chat?authSource=admin

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}

security.jwt.secret-key=${JWT_SECRET}

social.service.url=${SOCIAL_SERVICE_URL:http://mobflow-social:8085}
internal.secret=${INTERNAL_SECRET}
internal.http.connect-timeout=${INTERNAL_HTTP_CONNECT_TIMEOUT:500ms}
internal.http.read-timeout=${INTERNAL_HTTP_READ_TIMEOUT:2s}

app.kafka.topics.social-events=${SOCIAL_EVENTS_TOPIC:social.events}
app.websocket.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGINS:*}

server.port=8086
server.servlet.context-path=/chat

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when_authorized
management.info.env.enabled=true
management.metrics.tags.application=${spring.application.name}
info.app.name=${spring.application.name}
info.app.description=Realtime chat and conversation service
