spring.application.name=chat-service
spring.data.mongodb.auto-index-creation=true
spring.data.mongodb.uri=mongodb://${MONGO_USER}:${MONGO_PASSWORD}@${MONGO_HOST:mongodb}:${MONGO_PORT:27017}/chat?authSource=admin

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}

security.jwt.secret-key=${JWT_SECRET}

social.service.url=${SOCIAL_SERVICE_URL:http://mobflow-social:8085}
internal.secret=${INTERNAL_SECRET}

app.kafka.topics.social-events=${SOCIAL_EVENTS_TOPIC:social.events}
app.websocket.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGINS:*}

server.port=8086
server.servlet.context-path=/chat
