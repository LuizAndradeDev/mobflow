spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: ${gateway.routes.auth-service-uri:http://auth-service:8080}
              predicates:
                - Path=/api/auth,/api/auth/**

            - id: user-service
              uri: ${gateway.routes.user-service-uri:http://user-service:8081}
              predicates:
                - Path=/api/users,/api/users/**

            - id: workspace-service
              uri: ${gateway.routes.workspace-service-uri:http://workspace-service:8082}
              predicates:
                - Path=/api/workspaces,/api/workspaces/**

            - id: task-service
              uri: ${gateway.routes.task-service-uri:http://task-service:8083}
              predicates:
                - Path=/api/tasks,/api/tasks/**
              filters:
                - RewritePath=/api/tasks/?(?<segment>.*), /tasks/api/${segment}

            - id: notification-service
              uri: ${gateway.routes.notification-service-uri:http://notification-service:8084}
              predicates:
                - Path=/api/notifications,/api/notifications/**

            - id: social-service
              uri: ${gateway.routes.social-service-uri:http://social-service:8085}
              predicates:
                - Path=/api/social,/api/social/**
              filters:
                - RewritePath=/api/social/?(?<segment>.*), /social/api/${segment}

            - id: chat-service-rest
              uri: ${gateway.routes.chat-service-uri:http://chat-service:8086}
              predicates:
                - Path=/api/chat,/api/chat/**
              filters:
                - RewritePath=/api/chat/?(?<segment>.*), /chat/api/${segment}

            - id: chat-service-websocket
              uri: ${gateway.routes.chat-websocket-uri:ws://chat-service:8086}
              predicates:
                - Path=/chat/ws/chat

          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  info:
    env:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

gateway:
  jwt:
    secret-key: ${JWT_SECRET:ZHVtbXlfc2VjcmV0X3JlcGxhY2Vfd2l0aF9hX3JlYWxfc2VjdXJlX2tleQ==}

  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:*}

rate-limit:
  requests-per-minute: 100

info:
  app:
    name: ${spring.application.name}
    description: API Gateway for Mobflow microservices platform

logging:
  level:
    org.springframework.cloud.gateway: INFO
    reactor.netty: WARN
