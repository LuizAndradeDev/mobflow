spring.application.name=social-service
spring.data.mongodb.uri=mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/social?authSource=admin
spring.data.mongodb.auto-index-creation=true
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS}
spring.kafka.consumer.group-id=social-service
spring.kafka.consumer.auto-offset-reset=earliest
security.jwt.secret-key=${JWT_SECRET}
auth.service.url=${AUTH_SERVICE_URL:http://mobflow-auth:8080}
task.service.url=${TASK_SERVICE_URL:http://mobflow-task:8083}
user.service.url=${USER_SERVICE_URL:http://mobflow-user:8081}
workspace.service.url=${WORKSPACE_SERVICE_URL}
internal.secret=${INTERNAL_SECRET}
app.kafka.topics.social-comment=${SOCIAL_COMMENT_EVENTS_TOPIC:social-comment-events}
app.kafka.topics.social-friendship=${SOCIAL_FRIENDSHIP_EVENTS_TOPIC:social-friendship-events}
server.port=8085
server.servlet.context-path=/social

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when_authorized
management.info.env.enabled=true
management.metrics.tags.application=${spring.application.name}
info.app.name=${spring.application.name}
info.app.description=Friendship and social collaboration service
