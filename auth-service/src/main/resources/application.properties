spring.application.name=auth-service
spring.jpa.properties.hibernate.jdbc.time_zone=America/Sao_Paulo

spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${AUTH_DB}?TimeZone=America/Sao_Paulo
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

security.jwt.secret-key=${JWT_SECRET}
security.jwt.expiration-time=${JWT_EXPIRATION}
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}

app.base-url=${APP_BASE_URL:http://localhost}
app.kafka.topics.auth=${AUTH_EVENTS_TOPIC:auth-events}
internal.secret=${INTERNAL_SECRET}

server.port=8080

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when_authorized
management.info.env.enabled=true
management.metrics.tags.application=${spring.application.name}
info.app.name=${spring.application.name}
info.app.description=Authentication and token issuing service

logging.level.org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer=ERROR
