version: "3.9"

services:

  auth-service:
    build: ./auth-service
    container_name: mobflow-auth
    ports:
      - "8080:8080"
    depends_on:
      - postgres-auth
    networks:
      - auth-network
    env_file:
      - .env

  postgres-auth:
    image: postgres:16
    container_name: auth-postgres

    env_file:
      - .env

    environment:
      POSTGRES_DB: ${AUTH_DB}
      POSTGRES_USER: ${AUTH_USER}
      POSTGRES_PASSWORD: ${AUTH_PASSWORD}
      TZ: America/Sao_Paulo

    ports:
      - "5432:5432"

    volumes:
      - postgres_auth_data:/var/lib/postgresql/data

    networks:
      - auth-network

volumes:
  postgres_auth_data:

networks:
  auth-network:
    driver: bridge