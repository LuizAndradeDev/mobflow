version: "3.9"

services:

  # ============================================================================
  # Infrastructure Services
  # ============================================================================

  mongodb:
    image: mongo:latest
    container_name: moblfow-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongodb_data:/data/db
    networks:
      - mobflow-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: mobflow-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - mobflow-network
    healthcheck:
      test: echo stat | nc localhost 2181
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: mobflow-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - mobflow-network
    healthcheck:
      test: kafka-topics --bootstrap-server localhost:9092 --list
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  mailhog:
    image: mailhog/mailhog:latest
    container_name: mobflow-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - mobflow-network

  # ============================================================================
  # Database Services
  # ============================================================================

  postgres:
    image: postgres:16
    container_name: mobflow-postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      TZ: America/Sao_Paulo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - mobflow-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: mobflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - mobflow-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: mobflow-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - mobflow-network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ============================================================================
  # Microservices
  # ============================================================================

  auth-service:
    build: ./auth-service
    container_name: mobflow-auth
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mobflow-network
    env_file:
      - .env

  user-service:
    build: ./user-service
    container_name: mobflow-user
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mobflow-network
    env_file:
      - .env

  workspace-service:
    build: ./workspace-service
    container_name: mobflow-workspace
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      user-service:
        condition: service_started
    networks:
      - mobflow-network
    env_file:
      - .env

  task-service:
    build: ./task-service
    container_name: mobflow-task
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      workspace-service:
        condition: service_started
      user-service:
        condition: service_started
    networks:
      - mobflow-network
    env_file:
      - .env

  notification-service:
    build: ./notification-service
    container_name: mobflow-notification
    ports:
      - "8084:8084"
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mailhog:
        condition: service_started
    networks:
      - mobflow-network
    env_file:
      - .env

  # ============================================================================
  # Web Application
  # ============================================================================

  web-app:
    build:
      context: ./web-app
      dockerfile: Dockerfile
    container_name: mobflow-webapp
    networks:
      - mobflow-network

  # ============================================================================
  # Reverse Proxy
  # ============================================================================

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: mobflow-nginx
    ports:
      - "80:80"
    depends_on:
      - auth-service
      - user-service
      - workspace-service
      - task-service
      - notification-service
    networks:
      - mobflow-network

volumes:
  postgres_data:
  minio_data:
  redis_data:
  mongodb_data:

networks:
  mobflow-network:
    driver: bridge
