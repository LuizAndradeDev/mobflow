x-app-env: &app-env
  DB_HOST: ${DB_HOST:-postgres}
  DB_PORT: ${DB_PORT:-5432}
  DB_USER: ${DB_USER:-mobflow}
  DB_PASSWORD: ${DB_PASSWORD:-mobflow_secret}
  AUTH_DB: ${AUTH_DB:-mobflow_auth}
  USER_DB: ${USER_DB:-mobflow_user}
  WORKSPACE_DB: ${WORKSPACE_DB:-mobflow_workspace}
  TASK_DB: ${TASK_DB:-mobflow_task}
  JWT_SECRET: ${JWT_SECRET:-QGXgm8syhGOcl8UlHI8l4wAAx/+ztNB3ZDULgAO64X4=}
  JWT_EXPIRATION: ${JWT_EXPIRATION:-3600000}
  INTERNAL_SECRET: ${INTERNAL_SECRET:-mobflow-internal-secret-2024}
  REDIS_HOST: ${REDIS_HOST:-redis}
  REDIS_PORT: ${REDIS_PORT:-6379}
  MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
  MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-http://localhost:9000}
  MINIO_ROOT_USER: ${MINIO_ROOT_USER:-mobflow_minio}
  MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-mobflow_minio_secret}
  MINIO_BUCKET: ${MINIO_BUCKET:-mobflow-avatars}
  MONGO_USER: ${MONGO_USER:-mobflow-mongo}
  MONGO_PASSWORD: ${MONGO_PASSWORD:-mongo-secret}
  MONGO_HOST: ${MONGO_HOST:-mongodb}
  MONGO_PORT: ${MONGO_PORT:-27017}
  KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
  AUTH_EVENTS_TOPIC: ${AUTH_EVENTS_TOPIC:-auth-events}
  TASK_EVENTS_TOPIC: ${TASK_EVENTS_TOPIC:-task-events}
  WORKSPACE_EVENTS_TOPIC: ${WORKSPACE_EVENTS_TOPIC:-workspace-events}
  SOCIAL_COMMENT_EVENTS_TOPIC: ${SOCIAL_COMMENT_EVENTS_TOPIC:-social-comment-events}
  SOCIAL_FRIENDSHIP_EVENTS_TOPIC: ${SOCIAL_FRIENDSHIP_EVENTS_TOPIC:-social-friendship-events}
  SOCIAL_EVENTS_TOPIC: ${SOCIAL_EVENTS_TOPIC:-social.events}
  USER_SERVICE_URL: ${USER_SERVICE_URL:-http://mobflow-user:8081}
  WORKSPACE_SERVICE_URL: ${WORKSPACE_SERVICE_URL:-http://mobflow-workspace:8082}
  TASK_SERVICE_URL: ${TASK_SERVICE_URL:-http://mobflow-task:8083}
  SOCIAL_SERVICE_URL: ${SOCIAL_SERVICE_URL:-http://mobflow-social:8085}
  APP_BASE_URL: ${APP_BASE_URL:-http://localhost}
  MAIL_HOST: ${MAIL_HOST:-mailhog}
  MAIL_PORT: ${MAIL_PORT:-1025}
  MAIL_USERNAME: ${MAIL_USERNAME:-no-reply@mobflow.dev}
  MAIL_PASSWORD: ${MAIL_PASSWORD:-}

services:
  mongodb:
    image: mongo:latest
    container_name: moblfow-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-mobflow-mongo}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-mongo-secret}
    volumes:
      - mongodb_data:/data/db
    networks:
      - mobflow-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: mobflow-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - mobflow-network
    healthcheck:
      test: echo stat | nc localhost 2181
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: mobflow-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - mobflow-network
    healthcheck:
      test: kafka-topics --bootstrap-server localhost:9092 --list
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  mailhog:
    image: mailhog/mailhog:latest
    container_name: mobflow-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - mobflow-network

  postgres:
    image: postgres:16
    container_name: mobflow-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_USER: ${DB_USER:-mobflow}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mobflow_secret}
      TZ: America/Sao_Paulo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    networks:
      - mobflow-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-mobflow} -d ${POSTGRES_DB:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-bootstrap:
    image: postgres:16
    container_name: mobflow-postgres-bootstrap
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *app-env
      PGPASSWORD: ${DB_PASSWORD:-mobflow_secret}
    entrypoint:
      - sh
      - -ec
      - |
        psql --host=postgres --port="${DB_PORT}" --username="${DB_USER}" --dbname="${POSTGRES_DB:-postgres}" --set=ON_ERROR_STOP=1 \
          --set=AUTH_DB="${AUTH_DB}" --set=USER_DB="${USER_DB}" --set=WORKSPACE_DB="${WORKSPACE_DB}" --set=TASK_DB="${TASK_DB}" <<'SQL'
        SELECT 'CREATE DATABASE "' || :'AUTH_DB' || '"' WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = :'AUTH_DB')\gexec
        SELECT 'CREATE DATABASE "' || :'USER_DB' || '"' WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = :'USER_DB')\gexec
        SELECT 'CREATE DATABASE "' || :'WORKSPACE_DB' || '"' WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = :'WORKSPACE_DB')\gexec
        SELECT 'CREATE DATABASE "' || :'TASK_DB' || '"' WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = :'TASK_DB')\gexec
        SQL
    networks:
      - mobflow-network

  redis:
    image: redis:7-alpine
    container_name: mobflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - mobflow-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: mobflow-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - mobflow-network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10


  auth-service:
    build: ./auth-service
    container_name: mobflow-auth
    ports:
      - "8080:8080"
    depends_on:
      postgres-bootstrap:
        condition: service_completed_successfully
    networks:
      - mobflow-network
    environment: *app-env

  user-service:
    build: ./user-service
    container_name: mobflow-user
    ports:
      - "8081:8081"
    depends_on:
      postgres-bootstrap:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mobflow-network
    environment: *app-env

  workspace-service:
    build: ./workspace-service
    container_name: mobflow-workspace
    ports:
      - "8082:8082"
    depends_on:
      postgres-bootstrap:
        condition: service_completed_successfully
      user-service:
        condition: service_started
    networks:
      - mobflow-network
    environment: *app-env

  task-service:
    build: ./task-service
    container_name: mobflow-task
    ports:
      - "8083:8083"
    depends_on:
      postgres-bootstrap:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      workspace-service:
        condition: service_started
      user-service:
        condition: service_started
    networks:
      - mobflow-network
    environment: *app-env

  notification-service:
    build: ./notification-service
    container_name: mobflow-notification
    ports:
      - "8084:8084"
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mailhog:
        condition: service_started
    networks:
      - mobflow-network
    environment: *app-env

  social-service:
    build: ./social-service
    container_name: mobflow-social
    ports:
      - "8085:8085"
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
      auth-service:
        condition: service_started
      workspace-service:
        condition: service_started
      task-service:
        condition: service_started
    networks:
      - mobflow-network
    environment: *app-env

  chat-service:
    build: ./chat-service
    container_name: mobflow-chat
    ports:
      - "8086:8086"
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
      social-service:
        condition: service_started
    networks:
      - mobflow-network
    environment: *app-env


  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: mobflow-nginx
    ports:
      - "80:80"
    depends_on:
      - auth-service
      - user-service
      - workspace-service
      - task-service
      - notification-service
      - social-service
      - chat-service
    networks:
      - mobflow-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
  minio_data:
  redis_data:
  mongodb_data:

networks:
  mobflow-network:
    driver: bridge
