spring.application.name=notification-service
spring.data.mongodb.auto-index-creation=true
spring.data.mongodb.uri=mongodb://${MONGO_USER}:${MONGO_PASSWORD}@${MONGO_HOST:mongodb}:${MONGO_PORT:27017}/notifications?authSource=admin

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
spring.kafka.consumer.group-id=notification-service
spring.kafka.consumer.auto-offset-reset=earliest

security.jwt.secret-key=${JWT_SECRET}

spring.mail.host=${MAIL_HOST:mailhog}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:no-reply@mobflow.dev}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:false}

app.base-url=${APP_BASE_URL:http://localhost:4200}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200}
app.mail.max-attempts=${APP_MAIL_MAX_ATTEMPTS:3}
app.kafka.topics.auth=${AUTH_EVENTS_TOPIC:auth-events}
app.kafka.topics.task=${TASK_EVENTS_TOPIC:task-events}
app.kafka.topics.workspace=${WORKSPACE_EVENTS_TOPIC:workspace-events}
app.kafka.topics.social-comment=${SOCIAL_COMMENT_EVENTS_TOPIC:social-comment-events}
app.kafka.topics.social-friendship=${SOCIAL_FRIENDSHIP_EVENTS_TOPIC:social-friendship-events}

server.port=8084
