spring.application.name=task-service

spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${TASK_DB}?TimeZone=America/Sao_Paulo
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=America/Sao_Paulo
server.servlet.context-path=/tasks

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.repair-on-migrate=true

spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT:6379}


security.jwt.secret-key=${JWT_SECRET}
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}

internal.secret=${INTERNAL_SECRET}
workspace.service.url=${WORKSPACE_SERVICE_URL}
user.service.url=${USER_SERVICE_URL}
app.kafka.topics.task=${TASK_EVENTS_TOPIC:task-events}
app.task.due-soon-cron=${TASK_DUE_SOON_CRON:0 0 8 * * *}

server.port=8083

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when_authorized
management.info.env.enabled=true
management.metrics.tags.application=${spring.application.name}
info.app.name=${spring.application.name}
info.app.description=Task, board and analytics service
